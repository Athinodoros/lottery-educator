name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: cd frontend && npx eslint src/ --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

  # ── Stage 2: Backend Tests ───────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, game-engine, statistics, email-service, metrics-service]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd backend/${{ matrix.service }}
          npm ci

      - name: Run tests
        run: |
          cd backend/${{ matrix.service }}
          npx jest --forceExit --coverage --coverageReporters=text --coverageReporters=lcov
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lottery_test
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          flags: backend-${{ matrix.service }}
          directory: backend/${{ matrix.service }}/coverage
        continue-on-error: true

  # ── Stage 3: Frontend Tests ──────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npx vitest --run --coverage
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          flags: frontend
          directory: frontend/coverage
        continue-on-error: true

  # ── Stage 4: Build ──────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Build backend services
        run: |
          for service in api-gateway game-engine statistics email-service metrics-service; do
            echo "Building backend/$service..."
            cd backend/$service && npx tsc && cd ../..
          done

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Stage 5: Security Scan ──────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Audit frontend dependencies
        run: cd frontend && npm audit --production --audit-level=high
        continue-on-error: true

      - name: Audit backend dependencies
        run: |
          for service in api-gateway game-engine statistics email-service metrics-service; do
            echo "Auditing backend/$service..."
            cd backend/$service && npm audit --production --audit-level=high || true
            cd ../..
          done

      - name: Run Snyk (if token available)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        if: ${{ env.SNYK_TOKEN != '' }}
        continue-on-error: true

  # ── Stage 6: Docker Build (main branch only) ────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: ${{ vars.DOCKER_PUSH_ENABLED == 'true' }}

      - name: Push Docker images
        run: docker compose push
        if: ${{ vars.DOCKER_PUSH_ENABLED == 'true' }}
